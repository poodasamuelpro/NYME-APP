name: nyme
description: NYME - Application de livraison rapide et intelligente
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Supabase ──
  supabase_flutter: ^2.3.0

  # ── State Management ──
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # ── Navigation ──
  go_router: ^13.0.0

  # ── Cartes & GPS ──
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  flutter_map_cancellable_tile_provider: ^2.0.0

  # ── Google Maps (secours) ──
  google_maps_flutter: ^2.6.0

  # ── HTTP ──
  dio: ^5.4.0
  http: ^1.2.0

  # ── Firebase ──
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^17.0.0

  # ── Images ──
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.2.0

  # ── UI ──
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  flutter_svg: ^2.0.9
  gap: ^3.0.1
  modal_bottom_sheet: ^3.0.0
  pinput: ^5.0.0

  # ── Utils ──
  url_launcher: ^6.2.4
  intl: ^0.19.0
  timeago: ^3.6.0
  uuid: ^4.3.3
  share_plus: ^9.0.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.2
  package_info_plus: ^8.0.0

  # ── Stockage local sécurisé ──
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # ── Paiement ──
  webview_flutter: ^4.7.0

  # ── Icônes ──
  cupertino_icons: ^1.0.6
  flutter_iconly: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  json_serializable: ^6.7.1
  freezed: ^2.4.7
  freezed_annotation: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: NymeFont
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
